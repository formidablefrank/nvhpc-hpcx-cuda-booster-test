spack:
  config:
    install_tree:
      root: /leonardo_work/ICT26_MHPC_0/franco/spack-install/env-nvhpc-hpcx
    source_cache: /leonardo_work/ICT26_MHPC_0/franco/spack-source-cache
    binary_index_root: /leonardo_work/ICT26_MHPC_0/franco/spack-binary-index
    build_stage:
    - /leonardo_work/ICT26_MHPC_0/franco/spack-stage

  concretizer:
    unify: when_possible
    reuse: false

  specs:
  - cuda@12.2.2 %nvhpc@25.11
  - nvhpc@25.11
  - nccl@2.22.3-1 %nvhpc@25.11 cuda_arch=80 ^cuda@12.2.2
  - cudnn@9.2.0.82-12 %nvhpc@25.11 ^cuda@12.2.2
  - hdf5@1.14.3 %nvhpc@25.11
  - netcdf-fortran@4.6.1 %nvhpc@25.11 ^netcdf-c@4.9.2 %nvhpc@25.11
  - parallel-netcdf@1.12.3 %nvhpc@25.11

  packages:
    all:
      target: [icelake]
      providers:
        mpi: [hpcx-mpi]
    hpcx-mpi:
      externals:
      - spec: hpcx-mpi@2.20
        prefix: /leonardo/prod/spack/06/install/0.22/linux-rhel8-icelake/gcc-8.5.0/nvhpc-25.11-ayzlbce6ohpmv72ncfv4ogitmppp2usq/Linux_x86_64/25.11/comm_libs/12.9/hpcx/hpcx-2.20/ompi
      buildable: false
    cuda:
      buildable: true
    nvhpc:
      externals:
      - spec: nvhpc@25.11 ~mpi +blas +lapack default_cuda=12.2
        prefix: /leonardo/prod/spack/06/install/0.22/linux-rhel8-icelake/gcc-8.5.0/nvhpc-25.11-ayzlbce6ohpmv72ncfv4ogitmppp2usq
        modules:
        - nvhpc/25.11
      buildable: false
    nccl:
      buildable: true
    cudnn:
      buildable: true
    hdf5:
      buildable: true
      variants:
      - +mpi
      - +fortran
      - +hl
    netcdf-c:
      buildable: true
      variants:
      - +mpi
      - ~blosc
      - ~szip
      - ~zstd
    netcdf-fortran:
      buildable: true
    parallel-netcdf:
      buildable: true
      variants:
      - +cxx
      - +fortran
